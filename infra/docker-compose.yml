services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      - APP_ENV=development
      - HTTP_ADDR=:8080
      - LOG_LEVEL=debug
      - TRADER_MODE=mock
      - DATABASE_URL=file:/app/data/trader.db?_time_format=sqlite&_pragma=busy_timeout(5000)&_pragma=journal_mode(WAL)&_pragma=foreign_keys(on)
      - ALLOWED_ORIGIN=http://localhost
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-google/gemini-3.1-flash-lite-preview}
      - QUIVER_TOKEN=${QUIVER_TOKEN:-}
      - FINNHUB_KEY=${FINNHUB_KEY:-}
      - NEWSAPI_KEY=${NEWSAPI_KEY:-}
      - ALPACA_API_KEY=${ALPACA_API_KEY:-}
      - ALPACA_API_SECRET=${ALPACA_API_SECRET:-}
      - ALPHAVANTAGE_KEY=${ALPHAVANTAGE_KEY:-}
    volumes:
      - trader_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "80:80"
    environment:
      - PORT=80
      - BACKEND_HOST=backend
      - BACKEND_PORT=8080
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  trader_data:
